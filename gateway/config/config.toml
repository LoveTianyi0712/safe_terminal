[server]
grpc_addr       = ":50051"
max_connections = 10000
read_timeout    = "30s"
write_timeout   = "30s"

[kafka]
brokers          = ["localhost:9092"]
topic_logs       = "raw-logs"
topic_usb        = "usb-events"
topic_heartbeats = "heartbeats"
batch_size       = 100
batch_timeout    = "100ms"

[redis]
addr           = "localhost:6379"
password       = "safeTerminal@2025"
db             = 0
online_hash_key = "st:online:terminals"
policy_channel  = "st:policy:updates"
ttl_seconds    = 90

[tls]
# 开发环境设为 false 可跳过证书验证；生产环境务必改为 true
enabled   = false
cert_file = "/etc/safe_terminal/certs/server.crt"
key_file  = "/etc/safe_terminal/certs/server.key"
ca_file   = "/etc/safe_terminal/certs/ca.crt"

[jwt]
# 开发环境设为 false，探针只需传 x-terminal-id header；
# 生产环境设为 true 并与 Java application.yml jwt.secret 保持一致
enabled = false
secret  = "c2FmZS10ZXJtaW5hbC1qd3Qtc2VjcmV0LWtleS0yMDI1IQ=="

[metrics]
addr = ":9090"
